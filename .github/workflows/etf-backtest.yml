name: ETF Backtest
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backtest
        run: python etf_backtest.py
      - name: Upload results
        uses: actions/upload-artifact@v4
        with:
          name: etf-backtest-results
          path: output/
          retention-days: 1
