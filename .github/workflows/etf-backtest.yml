name: ETF Backtest
on:
  pull_request:
    branches: [main]
  workflow_dispatch:
jobs:
  run-backtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run backtest
        shell: bash
        run: |
          mkdir -p output
          python etf_backtest.py > output/run.log 2>&1 || true
          cat output/run.log
      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: etf-backtest-results
          path: output/
          retention-days: 1
